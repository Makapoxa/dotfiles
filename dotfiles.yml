---
- hosts: all
  tasks:
    - file: src={{ curdir }}/files/{{ item }} dest=~/.{{ item }} state=link force=yes
      with_items:
        - vimrc
        - git-prompt.sh
        - bash_customize

    - git:
        repo: https://github.com/VundleVim/Vundle.vim.git
        dest: ~/.vim/bundle/Vundle.vim

    - lineinfile:
        dest="~/.bashrc" line="source ~/.bash_customize" state=present create=yes
